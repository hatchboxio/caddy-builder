name: Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
          - runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    outputs:
      caddy_version: ${{ steps.build_caddy.outputs.caddy_version }}
    steps:
      - uses: actions/checkout@v6
      - name: Build Caddy
        id: build_caddy
        run: |
          bash caddy.sh
          chmod +x ./caddy
          caddy_version=$(./caddy version | cut -d " " -f1 | cut -c2-)
          echo "caddy_version=$caddy_version" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v6
        with:
          name: caddy-${{ steps.build_caddy.outputs.caddy_version }}-${{ runner.arch }}
          path: caddy

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided token
        run: |
          echo "${{ needs.build.outputs.caddy_version }}"
          gh release create "${{ needs.build.outputs.caddy_version }}" --title "${{ needs.build.outputs.caddy_version }}" --latest
          gh release upload "${{ needs.build.outputs.caddy_version }}" caddy-${{ needs.build.outputs.caddy_version }}-X64 --clobber --repo "${{ github.repository }}"
          gh release upload "${{ needs.build.outputs.caddy_version }}" caddy-${{ needs.build.outputs.caddy_version }}-ARM64 --clobber --repo "${{ github.repository }}"
