name: Build

on: :workflow_dispatch

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
          - runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Build Caddy
        id: build_caddy
        run: |
          bash caddy.sh
          chmod +x ./caddy
          caddy_version=$(./caddy version | cut -d " " -f1 | cut -c2-)
          echo "caddy_version=$caddy_version" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: caddy-${{ steps.build_caddy.outputs.caddy_version }}-${{ runner.arch }}
          path: caddy
