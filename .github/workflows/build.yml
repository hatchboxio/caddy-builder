name: Build

on:
  workflow_dispatch:
    inputs:
      caddy_version:
        description: "Caddy version to build"
        default: "latest"

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
          - runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    outputs:
      caddy_version: ${{ steps.build_caddy.outputs.caddy_version }}
    steps:
      - uses: actions/checkout@v6
      - name: Get architecture
        run: echo "ARCH=$(dpkg --print-architecture)" >> $GITHUB_ENV
      - name: Build Caddy
        id: build_caddy
        run: |
          bash caddy.sh ${{ github.event.inputs.caddy_version }}
          chmod +x caddy

          caddy_version="$(./caddy version | cut -d " " -f1 | cut -c2-)"
          echo "caddy_version=$caddy_version" >> "$GITHUB_OUTPUT"

          mv caddy "caddy-${caddy_version}-${{ env.ARCH }}"
      - uses: actions/upload-artifact@v6
        with:
          name: caddy-${{ steps.build_caddy.outputs.caddy_version }}-${{ env.ARCH }}
          path: caddy-${{ steps.build_caddy.outputs.caddy_version }}-${{ env.ARCH }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.build.outputs.caddy_version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete ALL existing releases matching this version (handles orphaned releases)
          for release_id in $(gh api repos/${{ github.repository }}/releases --paginate --jq ".[] | select(.name == \"${VERSION}\" or .tag_name == \"${VERSION}\") | .id"); do
            echo "Deleting release $release_id"
            gh api -X DELETE "repos/${{ github.repository }}/releases/$release_id" || true
          done

          # Also delete the tag if it exists
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/${VERSION}" 2>/dev/null || true

          gh release create "${VERSION}" caddy-${VERSION}-amd64 caddy-${VERSION}-arm64 --title "${VERSION}"
