name: Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
          - runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    outputs:
      caddy_version: ${{ steps.build_caddy.outputs.caddy_version }}
    steps:
      - uses: actions/checkout@v6
      - name: Build Caddy
        id: build_caddy
        run: |
          bash caddy.sh
          chmod +x ./caddy
          caddy_version=$(./caddy version | cut -d " " -f1 | cut -c2-)
          echo "caddy_version=$caddy_version" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v6
        with:
          name: caddy-${{ steps.build_caddy.outputs.caddy_version }}-${{ runner.arch }}
          path: caddy

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided token
        run: |
          echo "${{ needs.build.outputs.caddy_version }}"

          # Delete ALL existing releases matching this version (handles orphaned releases)
          for release_id in $(gh api repos/${{ github.repository }}/releases --paginate --jq ".[] | select(.name == \"${{ needs.build.outputs.caddy_version }}\" or .tag_name == \"${{ needs.build.outputs.caddy_version }}\") | .id"); do
            echo "Deleting release $release_id"
            gh api -X DELETE "repos/${{ github.repository }}/releases/$release_id" || true
          done
          # Also delete the tag if it exists
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/${{ needs.build.outputs.caddy_version }}" 2>/dev/null || true

          # Create release
          gh release create "${{ needs.build.outputs.caddy_version }}" --title "${{ needs.build.outputs.caddy_version }}" --latest
          gh release upload "${{ needs.build.outputs.caddy_version }}" caddy-${{ needs.build.outputs.caddy_version }}-X64 --clobber --repo "${{ github.repository }}"
          gh release upload "${{ needs.build.outputs.caddy_version }}" caddy-${{ needs.build.outputs.caddy_version }}-ARM64 --clobber --repo "${{ github.repository }}"
